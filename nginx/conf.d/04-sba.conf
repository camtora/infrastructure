# sba.camerontora.ca - SBA app backend API
# PUBLIC - app handles its own authentication

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=sba_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=sba_auth:10m rate=5r/m;

server {
    listen 80;
    server_name sba.camerontora.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name sba.camerontora.ca;

    ssl_certificate /etc/letsencrypt/live/camerontora-services/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camerontora-services/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Auth endpoints - stricter rate limit
    location ~ ^/api/auth/ {
        limit_req zone=sba_auth burst=3 nodelay;

        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://host.docker.internal:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API routes
    location /api/ {
        limit_req zone=sba_general burst=20 nodelay;

        proxy_pass http://host.docker.internal:3003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Placeholder until web app is ready
    location / {
        return 503;
    }
}
